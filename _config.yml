# MerNav Project Configuration
title: MerNav
url: https://qidekang.github.io
baseurl: /MerNav.github.io

# Site settings
timezone: UTC
future: true
highlighter: rouge

# Markdown processing
kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  enable_coderay: false

# Navigation
links:
  - title: MerNav
    url: /
  - title: GitHub
    url: https://github.com/QiDekang/MerNav.github.io
    external: true
  - title: Paper
    url: https://arxiv.org/abs/2602.05467 # Placeholder, user to update with arXiv link
    external: true

# Exclude unnecessary files from build
exclude: ["lib", "config.rb", "Capfile", "config", "log", "Rakefile", "Rakefile.rb", "tmp", "less", "*.sublime-*"]
